<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bodily-Kinesthetic Skills</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Courier New', monospace;
    background: #1a1a1a;
    color: #d4af37;
    display:flex;
    min-height:100vh;
    padding:20px;
}
.left { width:60%; }
.right { width:40%; display:flex; justify-content:center; align-items:flex-start; }
.right img { width:80%; margin-top:20px; }

.container { max-width: 900px; margin: 0 auto; }

.header { text-align: center; margin-bottom: 30px; color: #d4af37; }
.header h1 { font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin-bottom: 10px; }

.category-stats {
    background: linear-gradient(145deg, #2a2420, #3d3530);
    border: 4px solid #5a4a3a;
    border-radius: 8px;
    padding: 20px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.7);
    text-align: center;
}

.category-level { font-size: 2em; color: #ffd700; }
.category-exp { font-size: 1.2em; color: #c8b17a; }

.skills-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }

.skill-card {
    background: linear-gradient(135deg, #3a3530 0%, #2d2822 100%);
    border: 3px solid #5a4a3a;
    border-radius: 8px;
    padding: 20px;
    box-shadow: inset 0 1px 3px rgba(255,255,255,0.1), 0 5px 12px rgba(0,0,0,0.7);
    transition: 0.3s;
}

.skill-card:hover { transform: translateY(-3px); border-color:#8b7355; }

.sub-skill { display:flex; align-items:center; padding:10px; margin:6px 0; background:#2d2822; border:1px solid #5a4a3a; border-radius:6px;}

.exp-bar { background:#5a4a3a; height:8px; border-radius:4px; overflow:hidden;}
.exp-fill { background:linear-gradient(90deg,#c79b35,#ffd700); height:100%; }

.skill-header { display:flex; justify-content:space-between; cursor:pointer; }

.expand-icon { margin-left:10px; transition:0.3s; }
.rotated { transform:rotate(180deg); }

.sub-skills { display:none; margin-top:10px;}
.sub-skills.expanded { display:block; }
</style>
</head>
<body>

<div class="left">
<div class="container">
    <div class="header">
        <h1>🏃 Bodily-Kinesthetic</h1>
        <p>Master physical movement and body coordination</p>
    </div>

    <div class="category-stats">
        <div class="category-level" id="categoryLevel">Level 0</div>
        <div class="category-exp" id="categoryExp">0 EXP</div>
    </div>

    <div class="skills-grid" id="skillsGrid"></div>
</div>
</div>

<div class="right">
    <img src="sport_balls.svg">
</div>

<script>
const LOCAL_STORAGE_KEY = "bodilyKinestheticProgress";

const skillData = {
    'movement': { name:'Movement Skills', subSkills:[ {name:'Learn a dance routine',exp:40,completed:false}, {name:'Practice balance exercises',exp:30,completed:false}, {name:'Improve flexibility',exp:50,completed:false}]},
    'basketball':{ name:'Baseball', subSkills:[{name:'Dribble a ball',exp:10,completed:false}, {name:'Make 100 2-point throws',exp:10,completed:false}, {name: 'Make 100 free throws', exp: 20, completed: false}, {name: 'Make 100 3-point throws', exp: 30, completed: false}, {name: 'Make a half court shot', exp: 30, completed: false}, {name: 'Score 10 points in a game', exp: 30, completed: false}, {name: 'Win a game', exp: 40, completed: false}, {name: 'Get 5 steals and 3 blocks in a game', exp: 40, completed: false}, {name: 'Win a local basketball tournament', exp: 50, completed: false}, {name: 'Win a state or league championship', exp: 60, completed: false}]},
    'football':{ name:'Football', subSkills:[{name:'hit ball',exp:50,completed:false}]},
    'tennis':{ name:'Tennis', subSkills:[{name:'hit ball',exp:50,completed:false}]},
    'soccer':{ name:'Soccer', subSkills:[{name:'hit ball',exp:50,completed:false}]},
    'badminton':{ name:'Badminton', subSkills:[{name:'hit ball',exp:50,completed:false}]},
    'golf':{ name:'Golf', subSkills:[{name:'hit ball',exp:50,completed:false}]}
};

let userProgress={ totalExp:0, level:0, skills:{} };

function initializeProgress() {
    const saved = localStorage.getItem(LOCAL_STORAGE_KEY);

    if (saved) {
        userProgress = JSON.parse(saved);

        // Fix: ensure every new skill is initialized even with old saves
        for (let key in skillData) {
            if (!userProgress.skills[key]) {
                userProgress.skills[key] = { exp: 0, level: 0, completedSubSkills: [] };
            }
        }

        // Reapply completed flags
        for (let key in userProgress.skills) {
            if (skillData[key]) {
                userProgress.skills[key].completedSubSkills.forEach(i => {
                    if (skillData[key].subSkills[i]) {
                        skillData[key].subSkills[i].completed = true;
                    }
                });
            }
        }
        return;
    }

    // Fresh initialization (no saved data)
    for (let key in skillData) {
        userProgress.skills[key] = { exp: 0, level: 0, completedSubSkills: [] };
    }
}


function saveProgress(){ localStorage.setItem(LOCAL_STORAGE_KEY,JSON.stringify(userProgress)); }

function calculateLevel(exp){ return Math.floor(exp/100); }
function expToNextLevel(exp){ return (calculateLevel(exp)+1)*100 - exp; }

function toggleSubSkill(skillKey,i){
    const sub=skillData[skillKey].subSkills[i];
    if(sub.completed) return;
    sub.completed=true;

    userProgress.skills[skillKey].exp+=sub.exp;
    userProgress.totalExp+=sub.exp;
    userProgress.skills[skillKey].completedSubSkills.push(i);

    userProgress.skills[skillKey].level = calculateLevel(userProgress.skills[skillKey].exp);
    userProgress.level = calculateLevel(userProgress.totalExp);

    updateUI(); saveProgress();
}

function updateUI(){
    document.getElementById('categoryLevel').textContent=`Level ${userProgress.level}`;
    document.getElementById('categoryExp').textContent=`${userProgress.totalExp} EXP`;

    const grid=document.getElementById('skillsGrid');
    grid.innerHTML='';

    for(let key in skillData){
        const sk=skillData[key];
        const pr=userProgress.skills[key];
        const percent = pr.exp % 100;

        const card=document.createElement('div');
        card.className='skill-card';

        card.innerHTML=`
            <div class="skill-header" onclick="toggleSkillExpansion('${key}')">
                <div class="skill-title">${sk.name}</div>
                <div><span class="skill-level">Level ${pr.level}</span>
                <span class="expand-icon" id="expand-${key}">▼</span></div>
            </div>
            <div>${pr.exp} EXP (${expToNextLevel(pr.exp)} to next level)</div>
            <div class="exp-bar"><div class="exp-fill" style="width:${percent}%"></div></div>
            <div class="sub-skills" id="subskills-${key}">
                ${sk.subSkills.map((s,i)=>`
                    <div class="sub-skill">
                        <input type="checkbox" ${s.completed?'checked disabled':''}
                        onchange="toggleSubSkill('${key}',${i})">
                        <label>${s.name}</label>
                        <div>+${s.exp} EXP</div>
                    </div>`).join('')}
            </div>`;
        grid.appendChild(card);
    }
}

function toggleSkillExpansion(key){
    document.getElementById(`subskills-${key}`).classList.toggle('expanded');
    document.getElementById(`expand-${key}`).classList.toggle('rotated');
}

initializeProgress();
updateUI();
</script>

</body>
</html>
